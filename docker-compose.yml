services:
  chroma:
    image: chromadb/chroma
    container_name: chroma-db
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/chroma

  backend:
    build: ./pdf-chatbot-backend
    container_name: nest-backend
    ports:
      - "5000:5000"
    depends_on:
      - chroma
    environment:
      - CHROMA_URL=http://chroma:8000

  frontend:
    build: ./pdf-chat-frontend
    container_name: react-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./pdf-chat-frontend:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  chroma_data:
